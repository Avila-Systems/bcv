<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tasas BCV — Banco Central de Venezuela</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f5f6f8;
        --card: #ffffff;
        --text: #1a1a2e;
        --muted: #6b7280;
        --accent: #b91c1c;
        --border: #e5e7eb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f1115;
          --card: #191c22;
          --text: #f3f4f6;
          --muted: #9ca3af;
          --accent: #f87171;
          --border: #2a2e37;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        padding: 2rem 1rem;
      }
      main { width: 100%; max-width: 560px; }
      header { text-align: center; margin-bottom: 1.5rem; }
      h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
      .subtitle { color: var(--muted); font-size: .9rem; margin: 0; }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: .5rem 1.25rem;
        box-shadow: 0 1px 3px rgba(0,0,0,.06);
      }
      .row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        padding: .9rem 0;
        border-bottom: 1px solid var(--border);
      }
      .row:last-child { border-bottom: none; }
      .code { font-weight: 600; font-size: 1.05rem; }
      .name { color: var(--muted); font-size: .8rem; margin-left: .5rem; }
      .value { font-variant-numeric: tabular-nums; font-size: 1.15rem; font-weight: 600; }
      .value small { color: var(--muted); font-weight: 400; font-size: .75rem; }
      footer { text-align: center; color: var(--muted); font-size: .78rem; margin-top: 1.25rem; line-height: 1.5; }
      .stale { color: var(--accent); }
      .loading, .error { text-align: center; padding: 2rem 0; color: var(--muted); }
      .error { color: var(--accent); }
      a { color: inherit; }
      .api-example { margin-top: 1.5rem; }
      .api-example h2 { font-size: .85rem; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 0 0 .5rem; }
      .api-example pre {
        margin: 0;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: .85rem 1rem;
        overflow-x: auto;
        font-size: .85rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      .api-example a { color: var(--accent); text-decoration: none; }
      .made-by a { color: var(--accent); text-decoration: none; font-weight: 600; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Tasas de Cambio — BCV</h1>
        <p class="subtitle">Banco Central de Venezuela</p>
      </header>
      <div id="content" class="card">
        <div class="loading">Cargando tasas…</div>
      </div>

      <section class="api-example" id="api-example" hidden>
        <h2>API</h2>
        <pre id="api-curl"></pre>
      </section>

      <footer id="footer"></footer>
    </main>

    <script>
      const NAMES = {
        USD: 'Dólar estadounidense',
        EUR: 'Euro',
        CNY: 'Yuan chino',
        TRY: 'Lira turca',
        RUB: 'Rublo ruso',
      };

      function fmt(n) {
        return new Intl.NumberFormat('es-VE', {
          minimumFractionDigits: 2,
          maximumFractionDigits: 8,
        }).format(n);
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) =>
          ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
        );
      }

      async function loadConfig() {
        const footer = document.getElementById('footer');
        try {
          const cfg = await (await fetch('/api/config')).json();

          const endpoint = `${cfg.apiBaseUrl}/api/rates`;
          const section = document.getElementById('api-example');
          const pre = document.getElementById('api-curl');
          pre.innerHTML =
            `$ curl <a href="${escapeHtml(endpoint)}" target="_blank" rel="noreferrer">${escapeHtml(endpoint)}</a>`;
          section.hidden = false;

          const name = escapeHtml(cfg.madeByName || 'Avila Systems');
          const madeBy = cfg.madeByUrl
            ? `<span class="made-by">Creado por: <a href="${escapeHtml(cfg.madeByUrl)}" target="_blank" rel="noreferrer">${name}</a></span>`
            : `<span class="made-by">Creado por: ${name}</span>`;
          footer.dataset.madeBy = madeBy;
        } catch {
          /* config is best-effort; page still works without it */
        }
      }

      async function load() {
        const content = document.getElementById('content');
        const footer = document.getElementById('footer');
        try {
          const res = await fetch('/api/rates');
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const data = await res.json();

          const rows = Object.entries(data.rates)
            .map(
              ([code, value]) => `
              <div class="row">
                <div><span class="code">${code}</span><span class="name">${NAMES[code] || ''}</span></div>
                <div class="value">${fmt(value)} <small>Bs.</small></div>
              </div>`
            )
            .join('');
          content.innerHTML = rows || '<div class="error">Sin datos.</div>';

          const updated = new Date(data.fetchedAt).toLocaleString('es-VE');
          const staleNote = data.stale
            ? ' <span class="stale">(datos en caché, no se pudo actualizar)</span>'
            : '';
          const ref = data.referenceDate ? `Fecha de referencia: ${data.referenceDate}<br>` : '';
          const madeBy = footer.dataset.madeBy ? `<br>${footer.dataset.madeBy}` : '';
          footer.innerHTML =
            ref + `Actualizado: ${updated}${staleNote}<br>` +
            'Fuente: <a href="https://www.bcv.org.ve/" target="_blank" rel="noreferrer">bcv.org.ve</a>' +
            madeBy;
        } catch (err) {
          content.innerHTML = '<div class="error">No se pudieron cargar las tasas. Intenta de nuevo.</div>';
          footer.textContent = String(err.message || err);
        }
      }

      loadConfig().then(load);
    </script>
  </body>
</html>
